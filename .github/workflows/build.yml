name: Build iOS App

on:
  workflow_dispatch:

jobs:
  build:
    name: Build RevieTerminal
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Build for Simulator
        run: |
          xcodebuild \
            -project RevieTerminal.xcodeproj \
            -scheme RevieTerminal \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build \
            | xcpretty || true

      - name: Archive app
        run: |
          xcodebuild \
            -project RevieTerminal.xcodeproj \
            -scheme RevieTerminal \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build \
            | xcpretty || true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: RevieTerminal-Simulator
          path: build/Build/Products/Debug-iphonesimulator/RevieTerminal.app
          if-no-files-found: warn
          retention-days: 7
