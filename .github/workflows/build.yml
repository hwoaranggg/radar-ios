name: Build iOS App

on:
  workflow_dispatch:

jobs:
  build:
    name: Build RevieTerminal
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show repo structure
        run: |
          echo "=== Корень репозитория ==="
          ls -la
          echo ""
          echo "=== Ищем .xcodeproj ==="
          find . -name "*.xcodeproj" -maxdepth 5
          echo ""
          echo "=== Доступные версии Xcode ==="
          ls /Applications | grep Xcode

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      # Путь подстроен под твою структуру: radar-ios/RevieTerminal/RevieTerminal.xcodeproj
      - name: Build for Simulator
        run: |
          xcodebuild \
            -project RevieTerminal/RevieTerminal.xcodeproj \
            -scheme RevieTerminal \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Show build output location
        run: find build -name "*.app" -maxdepth 6

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: RevieTerminal-Simulator
          path: build/Build/Products/Debug-iphonesimulator/RevieTerminal.app
          if-no-files-found: error
          retention-days: 7
