name: Build iOS App

on:
  # Запускается когда ты нажимаешь кнопку вручную на GitHub
  workflow_dispatch:

jobs:
  build:
    name: Build RevieTerminal
    # Берём бесплатный Mac от GitHub
    runs-on: macos-15

    steps:

      # Шаг 1: Скачать код из репозитория
      - name: Checkout code
        uses: actions/checkout@v4

      # Шаг 2: Выбрать Xcode 16
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      # Шаг 3: Собрать приложение для симулятора (не нужен платный сертификат)
      - name: Build for Simulator
        run: |
          xcodebuild \
            -project RevieTerminal.xcodeproj \
            -scheme RevieTerminal \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build \
            | xcpretty || true

      # Шаг 4: Собрать .app файл (для установки через AltStore — без платного аккаунта)
      - name: Archive app
        run: |
          xcodebuild \
            -project RevieTerminal.xcodeproj \
            -scheme RevieTerminal \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build \
            | xcpretty || true

      # Шаг 5: Упаковать и сохранить — GitHub даст ссылку для скачивания
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: RevieTerminal-Simulator
          path: build/Build/Products/Debug-iphonesimulator/RevieTerminal.app
          if-no-files-found: warn
          retention-days: 7
